<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Vibrant Teal/Cyan Gradient -->
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ff0c9"/>
      <stop offset="100%" stop-color="#00a78e"/>
    </linearGradient>
    
    <!-- Outer Glow -->
    <filter id="shield-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Modern Curved Shield with Transparent Background -->
  <path d="M64,12 C88,12 106,20 106,48 C106,86 80,108 64,116 C48,108 22,86 22,48 C22,20 42,12 64,12 Z" 
        fill="url(#shield-grad)" 
        filter="url(#shield-glow)"/>

  <!-- Cookie-like chocolate chip dots inside the shield (semitransparent dark slate) -->
  <circle cx="48" cy="42" r="4.5" fill="#141b25" opacity="0.35"/>
  <circle cx="52" cy="68" r="6" fill="#141b25" opacity="0.35"/>
  <circle cx="78" cy="48" r="5.5" fill="#141b25" opacity="0.35"/>
  <circle cx="74" cy="74" r="4" fill="#141b25" opacity="0.35"/>
  <circle cx="44" cy="88" r="5" fill="#141b25" opacity="0.35"/>

  <!-- Sleek White Shield Checkmark (indicates "Protected" state) -->
  <path d="M48,64 L58,74 L80,48" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="8" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
</svg>
